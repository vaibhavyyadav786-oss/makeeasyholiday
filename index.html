<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MakeEasyHoliday - Your Dream Vacation</title>
    <link rel="stylesheet" href="makeeasyholidayHomePage.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  </head>
  <body>
    <header class="navbar">
      <nav class="navbar" aria-label="Main Navigation">
        <a href="makeeasyholidayHomePage.html" class="logo">
          <h2></h2>
        </a>

        <div class="nav-links" id="nav-links"></div>

        <div class="nav-auth">
          <a href="#login-modal" class="login-btn">
            <i class="fas fa-user-circle"></i>
            <span></span>
          </a>
        </div>
      </nav>
    </header>

    <main>
      <section class="hero-section">
        <div class="video-overlay fixed-overlay">
          <h1 id="hero-title"></h1>
          <p id="hero-subtitle"></p>

          <form class="glass-form" id="hero-search-form">
            <input type="text" id="hero-destination" required />
            <input type="date" id="hero-date" required />
            <select id="hero-traveler"></select>
            <button type="button" id="hero-submit-button"></button>
          </form>
        </div>

        <div class="slider-container" id="hero-slider"></div>
      </section>

      <section class="destinations" id="packages-section">
        <h2 class="section-title" id="destinations-title"></h2>
        <div class="card-container" id="destinations-container"></div>
      </section>

      <section class="features">
        <h2 class="section-title" id="features-title"></h2>
        <div class="features-grid" id="features-container"></div>
      </section>

      <section class="lead-magnet">
        <div class="lead-container">
          <div class="lead-text">
            <h2 id="lead-title"></h2>
            <p id="lead-description"></p>
            <ul id="lead-benefits"></ul>
          </div>

          <div class="lead-form-box">
            <h3 id="lead-form-title"></h3>
            <form class="custom-quote-form">
              <input type="text" id="lead-name" required />

              <div class="input-row">
                <input type="tel" id="lead-phone" required />
                <input type="email" id="lead-email" required />
              </div>

              <input type="text" id="lead-destination" required />

              <div class="input-row">
                <input type="date" id="lead-date" required />
                <input type="number" id="lead-days" min="1" required />
              </div>

              <textarea rows="3" id="lead-requirements"></textarea>

              <button type="button" class="submit-lead-btn" id="lead-submit-button"></button>
            </form>
          </div>
        </div>
      </section>

      <section class="testimonials">
        <h2 class="section-title" id="testimonials-title"></h2>
        <p class="section-subtitle" id="testimonials-subtitle"></p>

        <div class="marquee-container">
          <div class="marquee-track" id="testimonials-container"></div>
        </div>
      </section>
    </main>

    <footer class="footer" id="contact-section">
      <div class="footer-columns">
        <div class="footer-col" id="footer-about"></div>
        <div class="footer-col" id="footer-links"></div>
        <div class="footer-col" id="footer-contact"></div>
        <div class="footer-col social-links" id="footer-social"></div>
      </div>

      <div class="footer-bottom">
        <p id="footer-copyright"></p>
      </div>
    </footer>

    <a href="https://wa.me/919876543210?text=Hi!%20I%20want%20to%20plan%20a%20trip." target="_blank" class="whatsapp-btn" aria-label="Contact on WhatsApp">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" />
    </a>

    <div id="login-modal" class="modal">
      <div class="modal-content">
        <a href="#" class="close-btn" aria-label="Close modal">&times;</a>

        <div class="modal-header">
          <h2 id="login-title"></h2>
          <p id="login-subtitle"></p>
        </div>

        <form class="login-form">
          <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="login-email" required />
          </div>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="login-password" required />
          </div>

          <button type="submit" class="submit-login-btn" id="login-submit-button"></button>
        </form>

        <p class="signup-link" id="login-signup-link"></p>
      </div>
    </div>

    <div id="signup-modal" class="modal">
      <div class="modal-content modal-content--signup">
        <a href="#" class="close-btn" aria-label="Close modal">&times;</a>

        <div class="modal-header">
          <h2 id="signup-title"></h2>
          <p id="signup-subtitle"></p>
        </div>

        <form class="login-form">
          <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="signup-name" required />
          </div>

          <div class="otp-row">
            <div class="input-group input-group--compact">
              <i class="fas fa-envelope"></i>
              <input type="email" id="signup-email" required />
            </div>
            <button type="button" class="verify-btn" id="signup-email-otp"></button>
          </div>

          <div class="otp-row">
            <div class="input-group input-group--compact">
              <i class="fas fa-mobile-alt"></i>
              <input type="tel" id="signup-phone" required />
            </div>
            <button type="button" class="verify-btn" id="signup-phone-otp"></button>
          </div>

          <div class="input-group">
            <i class="fas fa-check-circle"></i>
            <input type="text" id="signup-otp" required />
          </div>

          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="signup-password" required />
          </div>

          <button type="submit" class="submit-login-btn" id="signup-submit-button"></button>
        </form>

        <p class="signup-link" id="signup-login-link"></p>
      </div>
    </div>

    <script src="utils.js"></script>
    <script src="makeeasyholiday_labels.js"></script>
    <script src="makeeasyholidayHomePage.js"></script>
  </body>
</html>
